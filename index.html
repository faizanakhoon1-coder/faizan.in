<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faizan Gaming Hub</title>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: #0f172a;
    color: white;
  }

  header {
    background: #1e293b;
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    color: #14b8a6;
  }

  nav {
    display: flex;
    justify-content: center;
    gap: 25px;
    background: #111827;
    padding: 15px;
  }

  nav a {
    color: #e0e0e0;
    text-decoration: none;
    font-weight: bold;
  }

  nav a:hover {
    color: #14b8a6;
  }

  .hero {
    text-align: center;
    padding: 60px 20px;
    background: #111827;
  }

  .hero h1 {
    font-size: 40px;
    color: #14b8a6;
  }

  .hero p {
    font-size: 20px;
    color: #d1d5db;
  }

  .games {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
  }

  .card {
    background: #1e293b;
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    transition: transform 0.2s;
    cursor: pointer;
  }

  .card:hover {
    transform: scale(1.05);
    background: #14b8a6;
    color: #111827;
  }

  footer {
    text-align: center;
    padding: 20px;
    background: #111827;
    margin-top: 30px;
    font-size: 14px;
    color: #94a3b8;
  }
</style>
</head>
<body>

<header>🎮 Faizan Gaming Hub</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Games</a>
  <a href="#">About</a>
  <a href="#">Contact</a>
</nav>

<section class="hero">
  <h1>Welcome to Faizan Gaming Hub</h1>
  <p>Your one-stop platform for top Android & PC games</p>
</section>

<section class="games">
  <div class="card">🔥 PUBG Mobile</div>
  <div class="card">🚗 GTA V</div>
  <div class="card">⚔️ Call of Duty</div>
  <div class="card">🏎️ Asphalt 9</div>
  <div class="card">🕹️ Fortnite</div>
  <div class="card">⚡ Valorant</div>
</section>

<footer>
  Developed by Faizan | © 2026
</footer>

</body>
</html>
